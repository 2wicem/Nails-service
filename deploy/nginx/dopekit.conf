# Nginx + Gunicorn on a VPS (Ubuntu/Debian).
# 1. Build frontend:  cd Frontend && npm ci && npm run build
# 2. Collect static: cd Backend && python manage.py collectstatic --noinput
# 3. Copy this file to /etc/nginx/sites-available/dopekit
# 4. Enable site, reload nginx, run Gunicorn via systemd (see dopekit.service)

upstream dopekit_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name dopekit.co.ke www.dopekit.co.ke;

    client_max_body_size 10M;

    # React build (adjust path to your server checkout)
    root /var/www/dopekit/Frontend/dist;
    index index.html;

    location /static/ {
        alias /var/www/dopekit/Backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://dopekit_gunicorn/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://dopekit_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /products/ {
        proxy_pass http://dopekit_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
