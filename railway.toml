[build]
builder = "nixpacks"
buildCommand = "cd Backend && pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd Backend && python manage.py migrate --noinput && gunicorn bootstrap.wsgi:application --config gunicorn.conf.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/products/"
healthcheckTimeout = 120
