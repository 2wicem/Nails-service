# Render blueprint — deploy from repo root or set rootDir to Backend in dashboard.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: dopekit-api
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn bootstrap.wsgi:application --config gunicorn.conf.py
    healthCheckPath: /products/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: USE_HTTPS
        value: "True"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: dopekit-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: AT_API_KEY
        sync: false

  - type: web
    name: dopekit-web
    runtime: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false

databases:
  - name: dopekit-db
    plan: free
    databaseName: nails_service
    user: nails_user
