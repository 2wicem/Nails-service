<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="env-body" x1="480" y1="140" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5c2d4a"/>
      <stop offset="1" stop-color="#3a1f33"/>
    </linearGradient>
    <linearGradient id="env-flap" x1="480" y1="80" x2="480" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e06b8a"/>
      <stop offset="1" stop-color="#a84d68"/>
    </linearGradient>
    <linearGradient id="env-pocket" x1="480" y1="280" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a3a4e"/>
      <stop offset="1" stop-color="#322636"/>
    </linearGradient>
    <linearGradient id="env-letter" x1="480" y1="195" x2="480" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8fa"/>
      <stop offset="1" stop-color="#f8d0de"/>
    </linearGradient>
    <filter id="env-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Letter paper (visible in the opening) -->
  <rect
    x="280"
    y="195"
    width="400"
    height="200"
    rx="5"
    fill="url(#env-letter)"
    stroke="#e8b86d"
    stroke-width="2"
  />

  <!-- Envelope back / inner -->
  <path
    d="M120 180 L480 340 L840 180 L840 460 L120 460 Z"
    fill="url(#env-body)"
    stroke="#e8b86d"
    stroke-width="3"
    filter="url(#env-shadow)"
  />

  <!-- Open top flap (folded back) -->
  <path
    d="M120 180 L480 340 L840 180 L480 40 Z"
    fill="url(#env-flap)"
    stroke="#e8b86d"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Front pocket (classic V fold) -->
  <path
    d="M120 460 L480 300 L840 460 Z"
    fill="url(#env-pocket)"
    stroke="#ff8fab"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Fold crease lines -->
  <path d="M120 180 L480 340 L840 180" stroke="#e8b86d" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 460 L480 300" stroke="#ff8fab" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M840 460 L480 300" stroke="#ff8fab" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Bottom edge -->
  <line x1="120" y1="460" x2="840" y2="460" stroke="#e8b86d" stroke-width="3" stroke-linecap="round"/>
</svg>
